services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      APP_DATABASE_URL: sqlite:///data/app.db
      APP_PDF_PATH: /app/ISLRv2_corrected_June_2023.pdf
      APP_BOOTSTRAP_INDEX: "true"
    volumes:
      - app_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - backend
      - frontend
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-aistudyassistant.bluesclawd.dev}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  app_data:
  caddy_data:
  caddy_config:
