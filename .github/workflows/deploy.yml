name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Add VPS host key to known_hosts to prevent MITM attacks
          echo "165.232.60.232 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIH9JfNRKqO1sAflK6YkHSvL09QvIcuar5pqFEGX4EEQ7" >> ~/.ssh/known_hosts
          echo "165.232.60.232 ssh-rsa " >> ~/.ssh/known_hosts
          echo "165.232.60.232 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBFWaSv46xPaztzoS/dWokVeFZDkCkywGE/ef24lVOnmoNQ0m1VNEE1JpO8y+PyDMOl4mzbhIUyhD6c89QtkmUdc=" >> ~/.ssh/known_hosts

      - name: Build and package
        run: |
          echo "=== 打包项目 ==="
          tar -czf /tmp/advanced-stat-qa.tar.gz \
            --exclude=.git \
            --exclude=.env \
            --exclude=.venv \
            --exclude=data \
            --exclude=frontend/node_modules \
            --exclude=frontend/dist \
            --exclude=__pycache__ \
            --exclude=.pytest_cache \
            .
          echo "=== 打包完成 ==="

      - name: Deploy to VPS
        run: |
          echo "=== 上传代码到 VPS ==="
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -P 10628 /tmp/advanced-stat-qa.tar.gz root@165.232.60.232:/tmp/advanced-stat-qa.tar.gz

          echo "=== 在 VPS 上执行部署 ==="
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -p 10628 root@165.232.60.232 << 'EOF'
            set -e
            echo "=== 开始部署 ==="
            cd /opt/advanced-stat-qa

            echo "=== 停止现有容器 ==="
            docker compose -p advanced-stat-qa -f app/docker-compose.server.yml down || true

            echo "=== 备份旧版本 ==="
            rm -rf app.prev
            mv app app.prev || true

            echo "=== 解压新版本 ==="
            mkdir app
            tar -xzf /tmp/advanced-stat-qa.tar.gz -C app

            echo "=== 恢复环境变量 ==="
            cp app.prev/.env app/.env
            chmod 600 app/.env

            echo "=== 构建并启动容器 ==="
            cd app
            docker compose -p advanced-stat-qa -f docker-compose.server.yml up -d --build

            echo "=== 等待服务启动 ==="
            sleep 5

            echo "=== 部署完成 ==="
          EOF

      - name: Health check
        run: |
          echo "=== 等待服务完全启动 ==="
          sleep 10
          echo "=== 检查服务健康状态 ==="
          curl -fsS https://aistudyassistant.bluesclawd.dev/api/health
          echo ""
          curl -fsS https://aistudyassistant.bluesclawd.dev/api/system/stats
          echo ""
          echo "=== 部署成功！==="
