services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      APP_DATABASE_URL: sqlite:///data/app.db
      APP_PDF_PATH: /app/ISLRv2_corrected_June_2023.pdf
      APP_BOOTSTRAP_INDEX: "true"
    ports:
      - "127.0.0.1:18000:8000"
    volumes:
      - app_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:18080:80"
    restart: unless-stopped

volumes:
  app_data:
